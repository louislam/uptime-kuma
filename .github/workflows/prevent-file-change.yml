name: prevent-file-change

# pull_request_target runs in the base repo's context with read access to
# the secrets needed for prevent-file-change. The action's docs warn
# against `pull_request` because a malicious PR could edit the workflow
# itself to bypass the check.
on:
  pull_request_target:
permissions: {}

jobs:
  check-file-changes:
    # Upstream wants src/lang/*.json edited only by the Weblate sync bot.
    # On this fork we legitimately edit those files (audit, prune orphans,
    # fix runtime-broken placeholders), so the gate would block our own
    # cleanup PRs. Restrict it to the upstream repo.
    if: github.repository == 'louislam/uptime-kuma'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Prevent file change
        uses: xalvarez/prevent-file-change-action@dbc67c205c9ed02aa39c497b422c24f364c3e8dd # v3.0.1
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          # Regex, /src/lang/*.json is not allowed to be changed, except for /src/lang/en.json
          pattern: '^(?!src/lang/en\.json$)src/lang/.*\.json$'
          trustedAuthors: UptimeKumaBot
