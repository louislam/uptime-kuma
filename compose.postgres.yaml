services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kuma
      POSTGRES_PASSWORD: kuma
      POSTGRES_DB: kuma
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kuma -d kuma" ]
      interval: 5s
      timeout: 5s
      retries: 10

  uptime-kuma:
    image: louislam/uptime-kuma:2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      UPTIME_KUMA_DB_TYPE: postgres
      UPTIME_KUMA_DB_HOSTNAME: postgres
      UPTIME_KUMA_DB_PORT: 5432
      UPTIME_KUMA_DB_NAME: kuma
      UPTIME_KUMA_DB_USERNAME: kuma
      UPTIME_KUMA_DB_PASSWORD: kuma
    volumes:
      - ./data:/app/data
    ports:
      - "3001:3001"
